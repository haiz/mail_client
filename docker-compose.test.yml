version: "3.8"
services:
  greenmail:
    image: greenmail/standalone:2.0.1
    ports:
      - "3143:3143"   # IMAP (plain)
      - "3993:3993"   # IMAPS (TLS)
      - "3025:3025"   # SMTP
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.users=test@localhost.com:password123
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3143"]
      interval: 2s
      timeout: 5s
      retries: 10
