<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: mint → teal, 135° -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="0.5" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
    <!-- Top-left highlight -->
    <radialGradient id="hi" cx="0.18" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft drop shadow under the plane -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="14" result="off"/>
      <feFlood flood-color="#0D4646" flood-opacity="0.30"/>
      <feComposite in2="off" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- macOS Sequoia squircle clip (corner radius 228 at 1024) -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Background layers -->
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#hi)"/>

    <!-- Motion trail: 2 curves behind the plane, fading -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
      <path d="M 180 760 Q 360 700 480 600" stroke-width="10" stroke-opacity="0.55"/>
      <path d="M 260 850 Q 460 780 540 690" stroke-width="10" stroke-opacity="0.32"/>
    </g>

    <!-- Paper plane, centered at (512,512), rotated -35° so nose points up-right -->
    <g transform="translate(512 512) rotate(-35)" filter="url(#shadow)">
      <!-- Upper face (visible top of plane) -->
      <polygon points="320,0 -320,-240 -130,90" fill="#FFFFFF"/>
      <!-- Lower face (underside flap visible at 3/4 angle), slightly dimmer for depth -->
      <polygon points="320,0 -130,90 -320,240" fill="#FFFFFF" fill-opacity="0.88"/>
      <!-- Crease line from nose to fold vertex -->
      <line x1="320" y1="0" x2="-130" y2="90" stroke="#000000" stroke-opacity="0.10" stroke-width="3"/>
    </g>
  </g>
</svg>
